<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareConnect Desktop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1A5276;
      --primary-light: #2E86C1;
      --secondary: #1E8449;
      --error: #C0392B;
      --warning: #D68910;
      --bg: #F8FAFB;
      --surface: #FFFFFF;
      --text: #212121;
      --text-muted: #757575;
      --border: #E0E0E0;
      --sidebar-width: 240px;
      --toolbar-height: 48px;
      --font-base: 16px;
    }
    body {
      font-family: 'Atkinson Hyperlegible', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: var(--font-base);
      line-height: 1.6;
      letter-spacing: 0.012em;
      word-spacing: 0.16em;
      background: var(--bg);
      color: var(--text);
    }
    /* Focus indicator — WCAG 2.4.7 */
    :focus-visible {
      outline: 3px solid var(--primary-light);
      outline-offset: 2px;
      border-radius: 4px;
    }
    /* Load Atkinson Hyperlegible for dyslexia-friendly text */
    @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');
    #root { height: 100vh; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="bundle.js"></script>
</body>
</html>
